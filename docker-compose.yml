services:
  video-db:
    image: mysql:8.0
    container_name: video-db
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=rootpass
      - MYSQL_DATABASE=video_platform
    volumes:
      - ./data/mysql:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3306:3306"
    networks:
      - video-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  video-redis:
    image: redis:7-alpine
    container_name: video-redis
    restart: unless-stopped
    volumes:
      - ./data/redis:/data
    ports:
      - "6379:6379"
    networks:
      - video-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  video-api:
    build: .
    container_name: video-api
    restart: unless-stopped
    volumes:
      - ./data/videos:/data/videos
    ports:
      - "8080:8080"
    networks:
      - video-network
    depends_on:
      - video-db
      - video-redis
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://video-db:3306/video_platform?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=rootpass
      - HTTP_PROXY_HOST=${HTTP_PROXY_HOST}
      - HTTP_PROXY_PORT=${HTTP_PROXY_PORT}
      - HTTPS_PROXY_HOST=${HTTPS_PROXY_HOST}
      - HTTPS_PROXY_PORT=${HTTPS_PROXY_PORT}
      - NON_PROXY=${NON_PROXY}

  video-ui:
    build: ./frontend
    container_name: video-ui
    restart: unless-stopped
    volumes:
      - ./data/videos:/data/videos:ro
    ports:
      - "80:80"
    networks:
      - video-network
    depends_on:
      - video-api

  video-alist:
    image: xhofe/alist:latest
    container_name: video-alist
    hostname: alist
    restart: unless-stopped
    environment:
      - PUID=0
      - PGID=0
      - UMASK=022
      - TZ=Asia/Shanghai
    volumes:
      - ./alist:/opt/alist/data
      - //192.168.4.119/move:/nas
    ports:
      - "5244:5244"
    networks:
      - video-network

networks:
  video-network:
    driver: bridge
