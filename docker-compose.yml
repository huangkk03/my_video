services:
  video-db:
    image: mysql:8.0
    container_name: video-db
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=rootpass
      - MYSQL_DATABASE=video_platform
    volumes:
      - ./data/mysql:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3306:3306"
    networks:
      - video-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  video-redis:
    image: redis:7-alpine
    container_name: video-redis
    restart: unless-stopped
    volumes:
      - ./data/redis:/data
    ports:
      - "6379:6379"
    networks:
      - video-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  video-api:
    build: .
    container_name: video-api
    restart: unless-stopped
    volumes:
      - ./data/videos:/data/videos
      - ./data/subtitles:/data/subtitles
      - ./data/downloads:/data/downloads
    ports:
      - "8080:8080"
    networks:
      - video-network
    depends_on:
      video-db:
        condition: service_healthy
      video-redis:
        condition: service_healthy
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://video-db:3306/video_platform?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=rootpass
      - HTTP_PROXY_HOST=${HTTP_PROXY_HOST}
      - HTTP_PROXY_PORT=${HTTP_PROXY_PORT}
      - HTTPS_PROXY_HOST=${HTTPS_PROXY_HOST}
      - HTTPS_PROXY_PORT=${HTTPS_PROXY_PORT}
      - JAVA_TOOL_OPTIONS=-Dhttp.nonProxyHosts="*.opensubtitles.com|opensubtitles.com" -Dhttps.nonProxyHosts="*.opensubtitles.com|opensubtitles.com"

  video-ui:
    build: ./frontend
    container_name: video-ui
    restart: unless-stopped
    volumes:
      - ./data/videos:/data/videos:ro
      - ./data/subtitles:/data/subtitles:ro
    ports:
      - "80:80"
    networks:
      - video-network
    depends_on:
      - video-api
networks:
  video-network:
    driver: bridge
